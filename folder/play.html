<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>小游戏</title>
 <link rel="stylesheet" href="style.css" />
</head>
<body>
 <canvas id="game" width="600" height="600" style="display: block;
 border: 3px solid #333;
 background: #fff;"></canvas>
 <script>
 const canvas = document.getElementById('game');
 const ctx = canvas.getContext('2d');
 let paddleX = 250;
 const paddleWidth = 90;
 const paddleHeight = 10;
 let ballX = 240, ballY = 150, dx = 600, dy = -600;
 let score = 0;
 // 游戏状态：0-未开始，1-进行中，2-结束
 let gameState = 0;
 let lastTime = 0;
 const ballImage = new Image();
 ballImage.src = '牢大.jpg'; // 确保有一个名为ball的图片
 const bricks = [];
 for (let i = 0; i < 5; i++) {
 bricks.push({ x: i * 80 + 10, y: 50, w: 70, h: 20, hit: false });
 }
 canvas.addEventListener('mousemove', e => {
 const rect = canvas.getBoundingClientRect();
 paddleX = e.clientX - rect.left - paddleWidth / 2;
 if (paddleX < 0) paddleX = 0;
 if (paddleX + paddleWidth > 600) paddleX = 600 - paddleWidth;
 });
 // 点击开始游戏/重新开始
 canvas.addEventListener('click', () => {
 if (gameState === 0 || gameState === 2) {
 startGame();
 }
 });

 // 画圆形图片的函数
 function drawBallImage(img, x, y, size) {
 if (!img.complete) return;
 ctx.save();
 ctx.beginPath();
 ctx.arc(x, y, size / 2, 0, Math.PI * 2);
 ctx.clip();
 ctx.drawImage(img, x - size / 2, y - size / 2, size, size);
 ctx.restore();
 }

 function startGame() {
 gameState = 1;
 ballX = 300;
 ballY = 200;
 dx = 300 * (Math.random() > 0.5 ? 1 : -1);
 dy = -300;
 score = 0;
 bricks.forEach(b => b.hit = false);
 }

 function draw(currentTime) {
 const deltaTime = (currentTime - lastTime) / 1000;
 lastTime = currentTime;
 const dt = Math.min(deltaTime, 0.1); // 限制最大时间步长，避免跳帧
 ctx.fillStyle = '#ffffff';
 ctx.fillRect(0, 0, 600, 600);
 //开始界面
 if (gameState === 0) {
 ctx.fillStyle = '#2c3e50';
 ctx.font = 'bold 36px Arial';
 ctx.textAlign = 'center';
 ctx.fillText('别让牢大坠机', 300, 120);

 ctx.font = '20px Arial';
 ctx.fillText('使用鼠标控制球拍', 300, 160);

 ctx.fillStyle = '#27ae60';
 ctx.font = 'bold 24px Arial';
 ctx.fillText('点击开始', 300, 220);

 requestAnimationFrame(draw);
 return;
 }
 // 结束界面
 if (gameState === 2) {
 ctx.fillStyle = '#2c3e50';
 ctx.font = 'bold 36px Arial';
 ctx.textAlign = 'center';
 ctx.fillText('游戏结束', 300, 100);

 ctx.font = 'bold 28px Arial';
 ctx.fillText('最终得分: ' + score, 300, 150);

 ctx.fillStyle = '#e74c3c';
 ctx.font = 'bold 24px Arial';
 ctx.fillText('点击重新开始', 300, 210);
 requestAnimationFrame(draw);
 return;
 }
 // 游戏进行中
 // 画砖块
 ctx.fillStyle = '#444';
 bricks.forEach(b => {
 if (!b.hit) ctx.fillRect(b.x, b.y, b.w, b.h);
 });
 // 画球（圆形图片）
 const ballSize = 56;
 drawBallImage(ballImage, ballX, ballY, ballSize);

 // 画球拍
 ctx.fillStyle = '#3498db';
 ctx.fillRect(paddleX, 540, paddleWidth, paddleHeight);

 // 球运动
 ballX += dx * dt;
 ballY += dy * dt;

 // 碰壁反弹
 const ballRadius = ballSize / 2;
 if (ballX <= ballRadius || ballX >= 600 - ballRadius) dx = -dx;
 if (ballY <= ballRadius) dy = -dy;
 // 碰砖块
 bricks.forEach(b => {
 if (!b.hit && ballX >= b.x && ballX <= b.x + b.w &&
 ballY >= b.y && ballY <= b.y + b.h) {
 b.hit = true;
 dy = -dy;
 }
 });

 // 碰到底部游戏结束
 if (ballY >= 550) {
 gameState = 2;
 }

 // 球拍碰撞
 if (ballY >= 540 && ballY < 550 && ballX >= paddleX && ballX <= paddleX + paddleWidth) {
 dy = -dy;
 score++;
 }
 // 显示分数
 ctx.fillStyle = '#333';
 ctx.font = 'bold 24px Arial';
 ctx.textAlign = 'right';
 ctx.fillText('分数: ' + score, 590, 30);
 requestAnimationFrame(draw);
 }
 lastTime = performance.now();
 requestAnimationFrame(draw);
 </script>
</body>
</html>
